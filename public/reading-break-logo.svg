<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48">
  <!-- Book cover bottom (gives thickness) -->
  <path d="M4,40 Q16,35 32,38 Q48,35 60,40 L60,44 Q48,39 32,42 Q16,39 4,44 Z" fill="#634636"/>

  <!-- Left page -->
  <path d="M32,38 Q18,33 4,40 L4,13 Q18,6 32,11 Z" fill="#f0eae5" stroke="#8d6548" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Right page -->
  <path d="M32,38 Q46,33 60,40 L60,13 Q46,6 32,11 Z" fill="#f0eae5" stroke="#8d6548" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Center spine -->
  <path d="M32,11 C31,21 31,29 32,38" stroke="#8d6548" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Text lines — left page -->
  <line x1="10" y1="20" x2="27" y2="18" stroke="#8d6548" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="9"  y1="26" x2="27" y2="24" stroke="#8d6548" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="9"  y1="32" x2="27" y2="30" stroke="#8d6548" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

  <!-- Text lines — right page -->
  <line x1="37" y1="18" x2="54" y2="20" stroke="#8d6548" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="37" y1="24" x2="55" y2="26" stroke="#8d6548" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="37" y1="30" x2="55" y2="32" stroke="#8d6548" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
</svg>
